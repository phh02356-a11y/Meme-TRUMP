<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFICIAL WEBSITE</title>
    <script src="config.js"></script>
    <style>
        /* 1. 全局装修：背景图和字体 */
        body { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('logo.png'); /* 背景使用Logo模糊处理，显高级 */
            background-size: cover;
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 60px 20px;
            margin: 0;
        }

        /* 2. Logo装修：加发光效果 */
        .logo { 
            max-width: 180px; 
            border: 4px solid #00ff00; 
            border-radius: 50%; 
            box-shadow: 0 0 20px #00ff00; /* 绿色发光 */
            margin-bottom: 30px; 
            transition: transform 0.3s;
        }
        .logo:hover { transform: scale(1.1); } /* 鼠标指上去会放大 */

        /* 3. 标题装修：超大加粗 */
        h1 { 
            font-size: 4rem; 
            margin: 10px 0; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            text-shadow: 2px 2px 10px #000;
        }

        /* 4. 黄金小字装修 */
        .promo-text { 
            color: #ffd700; 
            font-size: 1.2rem;
            font-style: italic; 
            margin: 20px auto;
            max-width: 600px;
            line-height: 1.6;
            text-shadow: 1px 1px 5px #000;
        }

        /* 5. 购买按钮：霓虹呼吸效果 */
        .buy-btn { 
            display: inline-block; 
            padding: 18px 40px; 
            background: #00ff00; 
            color: #000; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 24px; 
            border-radius: 50px; 
            margin: 30px 0;
            box-shadow: 0 0 15px #00ff00;
            transition: 0.3s;
        }
        .buy-btn:hover { 
            background: #fff; 
            box-shadow: 0 0 30px #fff; 
            transform: translateY(-5px); 
        }

        /* 6. CA地址框：半透明磨砂玻璃感 */
        .ca-box { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            padding: 20px; 
            word-break: break-all; 
            border: 1px solid rgba(255,255,255,0.2); 
            max-width: 500px;
            margin: 20px auto;
            border-radius: 10px;
            font-family: monospace;
            color: #00ff00;
        }
        .gb-btn { 
    display: inline-block; 
    padding: 18px 40px; 
    background: #ff4500; /* 橙红色，区分开 */
    color: #fff; 
    text-decoration: none; 
    font-weight: 900; 
    font-size: 24px; 
    border-radius: 50px; 
    margin: 10px;
    box-shadow: 0 0 15px #ff4500;
    transition: 0.3s;
}
    </style>
</head>
<body>
    <img src="logo.png" class="logo" alt="Token Logo">
    
    <h1 id="t-name">LOADING...</h1>
    <p id="t-symbol" style="font-size: 1.5rem; color: #aaa;">...</p>
    
    <p class="promo-text">Commemorating the 1-Year Anniversary of the Economic Revolution. The Storm is Here.</p>

    <a href="#" class="buy-btn" id="t-link">BUY ON PUMP.FUN</a><a href="#" class="gb-btn" id="t-gb">GO TO GB</a>
    
    <div class="ca-box">
        <div style="font-size: 12px; color: #888; margin-bottom: 5px;">CONTRACT ADDRESS:</div>
        <span id="t-ca">TBA</span>
    </div>

    <script>
        // 自动读取 config.js
        document.getElementById('t-name').innerText = PROJECT_DATA.name;
        document.getElementById('t-symbol').innerText = PROJECT_DATA.symbol;
        document.getElementById('t-ca').innerText = PROJECT_DATA.ca;
        document.getElementById('t-link').href = PROJECT_DATA.pumpLink;
        document.getElementById('t-link').innerText = "BUY " + PROJECT_DATA.symbol + " NOW";
        // 在原来的代码下面加上这一行
document.getElementById('t-gb').href = PROJECT_DATA.gbLink;
    </script>
</body>
</html>
